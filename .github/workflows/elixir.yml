name: Elixir CI

"on":
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: elixir-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  HEX_HTTP_TIMEOUT: "180"
  HEX_HTTP_CONCURRENCY: "1"

jobs:
  format_compile:
    name: Format and compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.1.1"
          elixir-version: "1.19.5"

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.MIX_ENV }}-otp-28.1.1-elixir-1.19.5-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.MIX_ENV }}-otp-28.1.1-elixir-1.19.5-

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get --check-locked

      - name: Compile dependencies
        run: mix deps.compile

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Check unused dependencies
        run: mix deps.unlock --check-unused

  ash_test:
    name: Ash codegen and tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vg_app_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vg_app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.1.1"
          elixir-version: "1.19.5"

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.MIX_ENV }}-otp-28.1.1-elixir-1.19.5-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.MIX_ENV }}-otp-28.1.1-elixir-1.19.5-

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get --check-locked

      - name: Prepare test database
        run: |
          mix ecto.create
          mix ecto.migrate

      - name: Check Ash codegen drift
        run: mix ash.codegen --check

      - name: Run tests
        run: mix test

  static_security_lint:
    name: Static analysis and security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.1.1"
          elixir-version: "1.19.5"

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.MIX_ENV }}-otp-28.1.1-elixir-1.19.5-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.MIX_ENV }}-otp-28.1.1-elixir-1.19.5-

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get --check-locked

      - name: Compile dependencies
        run: mix deps.compile

      - name: Run Credo
        run: mix credo --strict

      - name: Run Sobelow
        run: mix sobelow --exit

      - name: Audit dependencies
        run: mix deps.audit
